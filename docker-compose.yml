name: SOMA

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: soma
      MYSQL_USER: soma_user
      MYSQL_PASSWORD: soma_password
    volumes:
      - soma_db_data:/var/lib/mysql

volumes:
  soma_db_data: