<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOMA - Plataforma Educativa</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <h2>SOMA WEB</h2>
      <h3>Sistema de Orientación y Monitoreo Académico-emocional</h3>
      <form id="loginForm">
        <label>Correo</label>
        <input type="email" name="email" placeholder="Usuario@email.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="********" required>
        <div class="options">
          <label><input type="checkbox"> Remember Me</label>
          <a href="#">Restablecer contraseña</a>
        </div>
        <div class="buttons">
          <button type="submit" class="login">Iniciar Sesión</button>
          <button type="button" class="signup">Registrarse</button>
        </div>
        <p class="social-text">O iniciar sesión con</p>
        <div class="social-links">
          <!-- OAuth placeholders — funcionalidad pendiente -->
          <a class="icon" href="#" title="Próximamente">
            <div class="circle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M22 12a10 10 0 1 0-11.5 9.9v-7H8.5v-3h2v-2.3c0-2 1.2-3.1 3-3.1.9 0 1.8.1 1.8.1v2h-1c-1 0-1.3.6-1.3 1.2V12h2.3l-.4 3h-1.9v7A10 10 0 0 0 22 12z"/>
              </svg>
            </div>
            <span>Facebook</span>
          </a>
          <a class="icon" href="#" title="Próximamente">
            <div class="circle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#0A66C2">
                <path d="M4.98 3.5c0 1.38-1.12 2.5-2.49 2.5A2.5 2.5 0 0 1 0 3.5C0 2.12 1.12 1 2.49 1A2.5 2.5 0 0 1 4.98 3.5zM.5 8h4v14h-4V8zm7.5 0h3.8v2h.1c.5-1 1.8-2.2 3.9-2.2 4.2 0 5 2.7 5 6.2V22h-4v-7.2c0-1.7 0-3.8-2.3-3.8s-2.6 1.8-2.6 3.7V22h-4V8z"/>
              </svg>
            </div>
            <span>LinkedIn</span>
          </a>
          <a class="icon" href="#" title="Próximamente">
            <div class="circle">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#EA4335" d="M12 10.2v3.7h5.2c-.2 1.2-.8 2.2-1.8 2.9l2.8 2.2c1.6-1.5 2.5-3.7 2.5-6.3 0-.6 0-1.1-.1-1.6H12z"/>
                <path fill="#34A853" d="M12 22c2.4 0 4.5-.8 6-2.3l-2.8-2.2c-.8.5-1.8.8-3.2.8-2.5 0-4.6-1.7-5.3-4l-3 2.3C5 19.8 8.2 22 12 22z"/>
                <path fill="#4285F4" d="M6.7 14.3A6.1 6.1 0 0 1 6.3 12c0-.8.1-1.6.4-2.3L3.6 7.3A10 10 0 0 0 2 12c0 1.6.4 3.2 1.1 4.6l3.6-2.3z"/>
                <path fill="#FBBC05" d="M12 6.2c1.4 0 2.6.5 3.5 1.4l2.6-2.6A10 10 0 0 0 12 2 10 10 0 0 0 3.6 7.3l3.2 2.4c.8-2.2 2.9-3.5 5.2-3.5z"/>
              </svg>
            </div>
            <span>Google</span>
          </a>
        </div>
      </form>
    </div>
    <div class="right">
      <nav>
        <a href="#" data-role="docente">Docente</a>
        <a href="#" data-role="psicologo">Psicólogo</a>
        <a href="#" data-role="estudiante">Estudiante</a>
      </nav>
      <img src="https://www.apega.org/wp-content/uploads/2020/10/educacion-emocional.jpg" alt="Educación Emocional" class="img-emocional">
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
