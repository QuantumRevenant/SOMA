<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOMA - Sistema de Orientación y Monitoreo Académico-emocional</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <h2>SOMA WEB</h2>
      <h3>Sistema de Orientación y Monitoreo Académico-emocional</h3>
      <form id="loginForm">
        <label>Correo</label>
        <input type="email" name="email" placeholder="Usuario@email.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="********" required>
        <div class="options">
          <label><input type="checkbox"> Remember Me</label>
          <a href="#">Restablecer contraseña</a>
        </div>
        <div class="buttons">
          <button type="submit" class="login">Iniciar Sesión</button>
          <button type="button" class="signup">Registrarse</button>
        </div>
      </form>
    </div>
    <div class="right">
      <nav>
        <a href="#" >Soporte</a>
        <a href="#" >Informe Final</a>
        <a href="https://github.com/QuantumRevenant/SOMA" target="_blank" >Github</a>
      </nav>
      <img src="https://www.apega.org/wp-content/uploads/2020/10/educacion-emocional.jpg" alt="Educación Emocional" class="img-emocional">
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/chat-widget.js"></script>
</body>
</html>
